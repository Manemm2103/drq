services:
  icq-modern:
    build:
      context: .
      dockerfile: Dockerfile
    image: icq-modern:latest
    container_name: icq-modern
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATA_DIR: /app/data
      VAPID_PUBLIC_KEY: "${VAPID_PUBLIC_KEY}"
      VAPID_PRIVATE_KEY: "${VAPID_PRIVATE_KEY}"
      TURN_URLS: "turn:${TURN_PUBLIC_HOST}:3478?transport=udp,turn:${TURN_PUBLIC_HOST}:3478?transport=tcp"
      TURN_USERNAME: "${TURN_USERNAME}"
      TURN_CREDENTIAL: "${TURN_CREDENTIAL}"
    volumes:
      - icq_data:/app/data
    depends_on:
      - coturn

  coturn:
    image: coturn/coturn:4.6.3
    container_name: icq-coturn
    restart: unless-stopped
    command:
      - turnserver
      - --no-cli
      - --no-tls
      - --no-dtls
      - --fingerprint
      - --lt-cred-mech
      - --realm=${TURN_REALM}
      - --user=${TURN_USERNAME}:${TURN_CREDENTIAL}
      - --listening-port=3478
      - --min-port=49160
      - --max-port=49200
      - --external-ip=${TURN_EXTERNAL_IP}
      - --listening-ip=0.0.0.0
    ports:
      - "3478:3478/tcp"
      - "3478:3478/udp"
      - "49160-49200:49160-49200/udp"

volumes:
  icq_data:
